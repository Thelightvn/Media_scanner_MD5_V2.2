name: Build macOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest        # arm64 - Apple Silicon (M1/M2/M3)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller openpyxl

      - name: Download ffprobe (macOS arm64)
        run: |
          curl -L "https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffprobe.zip" \
               -o ffprobe.zip
          unzip -o ffprobe.zip
          chmod +x ffprobe
          echo "✅ ffprobe ready: $(./ffprobe -version 2>&1 | head -1)"

      - name: Build macOS App + bundle ffprobe
        run: |
          pyinstaller --onedir --windowed \
            --name "Media_Scanner_MD5_V2" \
            --add-binary "ffprobe:." \
            --hidden-import openpyxl \
            --hidden-import openpyxl.styles \
            --hidden-import openpyxl.utils \
            Media_scanner_MD5_V2_2.py

      - name: Verify ffprobe bundled
        run: |
          echo "=== Tìm ffprobe trong .app ==="
          find dist -name "ffprobe" 2>/dev/null \
            && echo "✅ ffprobe bundled OK" \
            || echo "⚠️  ffprobe không tìm thấy trong dist"

      - name: Zip output
        run: |
          cd dist
          zip -r ../Media_Scanner_MD5_V2_macOS.zip Media_Scanner_MD5_V2.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Media_Scanner_MD5_V2_macOS
          path: Media_Scanner_MD5_V2_macOS.zip
          retention-days: 30
