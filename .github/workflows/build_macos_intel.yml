name: Build macOS Intel (x86_64)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-macos-intel:
    # macos-13 = macOS Ventura, chip Intel x86_64
    # macos-latest / macos-14+ = Apple Silicon (M1) — KHÔNG dùng
    runs-on: macos-13

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout source code
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Cài Python 3.11 (x86_64 native trên macos-13)
      # ------------------------------------------------------------------ #
      - name: Set up Python 3.11 (x86_64)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ------------------------------------------------------------------ #
      # 3. Xác nhận architecture là Intel x86_64
      # ------------------------------------------------------------------ #
      - name: Verify architecture
        run: |
          uname -m          # phải in ra: x86_64
          python3 -c "import platform; print('Python arch:', platform.machine())"

      # ------------------------------------------------------------------ #
      # 4. Cài FFmpeg (bao gồm ffprobe) qua Homebrew — Intel binary
      # ------------------------------------------------------------------ #
      - name: Install FFmpeg via Homebrew (Intel)
        run: |
          brew install ffmpeg
          FFPROBE_BIN=$(which ffprobe)
          echo "ffprobe path  : $FFPROBE_BIN"
          echo "ffprobe arch  : $(file $FFPROBE_BIN)"
          ffprobe -version | head -1

      # ------------------------------------------------------------------ #
      # 5. Copy ffprobe vào thư mục project để PyInstaller bundle cùng app
      # ------------------------------------------------------------------ #
      - name: Copy ffprobe into project directory
        run: |
          FFPROBE_BIN=$(which ffprobe)
          cp "$FFPROBE_BIN" ./ffprobe
          chmod +x ./ffprobe
          echo "Copied: $(file ./ffprobe)"

      # ------------------------------------------------------------------ #
      # 6. Cài Python dependencies
      # ------------------------------------------------------------------ #
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller openpyxl imageio-ffmpeg

      # ------------------------------------------------------------------ #
      # 7. Build .app bằng PyInstaller (Intel x86_64, target_arch = x86_64)
      # ------------------------------------------------------------------ #
      - name: Build macOS Intel .app with PyInstaller
        run: |
          pyinstaller \
            --name "MediaScanner" \
            --windowed \
            --onefile \
            --target-arch x86_64 \
            --add-binary "ffprobe:." \
            --hidden-import openpyxl \
            --hidden-import openpyxl.styles \
            --hidden-import openpyxl.utils \
            --hidden-import imageio_ffmpeg \
            --osx-bundle-identifier "com.mediascanner.app" \
            Media_scanner_MD5_V2_2.py

      # ------------------------------------------------------------------ #
      # 8. Xác nhận binary output là x86_64
      # ------------------------------------------------------------------ #
      - name: Verify output binary architecture
        run: |
          APP_BIN="dist/MediaScanner.app/Contents/MacOS/MediaScanner"
          if [ -f "$APP_BIN" ]; then
            echo "App binary arch: $(file $APP_BIN)"
            lipo -info "$APP_BIN" || true
          else
            echo "WARNING: .app not found, checking dist/:"
            ls -lh dist/
          fi

      # ------------------------------------------------------------------ #
      # 9. Zip .app để upload
      # ------------------------------------------------------------------ #
      - name: Zip the .app bundle
        run: |
          cd dist
          zip -r MediaScanner_macOS_Intel.zip MediaScanner.app
          echo "=== Build output ==="
          ls -lh

      # ------------------------------------------------------------------ #
      # 10. Upload artifact
      # ------------------------------------------------------------------ #
      - name: Upload macOS Intel app artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaScanner-macOS-Intel
          path: dist/MediaScanner_macOS_Intel.zip
          retention-days: 30
