name: Build macOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # -------------------------------------------------------
  # Intel Mac (x86_64) — Mac Pro 2013, iMac/MacBook trước 2021
  # -------------------------------------------------------
  build-macos-intel:
    runs-on: macos-13            # macos-13 = Intel x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller openpyxl

      - name: Download ffprobe (macOS Intel x86_64)
        run: |
          curl -L "https://ffmpeg.martin-riedl.de/redirect/latest/macos/amd64/release/ffprobe.zip" \
               -o ffprobe.zip
          unzip -o ffprobe.zip
          chmod +x ffprobe
          echo "✅ ffprobe ready: $(./ffprobe -version 2>&1 | head -1)"

      - name: Build macOS App (Intel) + bundle ffprobe
        run: |
          pyinstaller --onedir --windowed \
            --name "Media_Scanner_MD5_V2_Intel" \
            --add-binary "ffprobe:." \
            --hidden-import openpyxl \
            --hidden-import openpyxl.styles \
            --hidden-import openpyxl.utils \
            Media_scanner_MD5_V2_2.py

      - name: Zip output
        run: |
          cd dist
          zip -r ../Media_Scanner_MD5_V2_macOS_Intel.zip Media_Scanner_MD5_V2_Intel.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Media_Scanner_MD5_V2_macOS_Intel
          path: Media_Scanner_MD5_V2_macOS_Intel.zip
          retention-days: 30

  # -------------------------------------------------------
  # Apple Silicon (arm64) — M1/M2/M3/M4
  # -------------------------------------------------------
  build-macos-arm:
    runs-on: macos-latest        # macos-latest = arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller openpyxl

      - name: Download ffprobe (macOS Apple Silicon arm64)
        run: |
          curl -L "https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffprobe.zip" \
               -o ffprobe.zip
          unzip -o ffprobe.zip
          chmod +x ffprobe
          echo "✅ ffprobe ready: $(./ffprobe -version 2>&1 | head -1)"

      - name: Build macOS App (Apple Silicon) + bundle ffprobe
        run: |
          pyinstaller --onedir --windowed \
            --name "Media_Scanner_MD5_V2_AppleSilicon" \
            --add-binary "ffprobe:." \
            --hidden-import openpyxl \
            --hidden-import openpyxl.styles \
            --hidden-import openpyxl.utils \
            Media_scanner_MD5_V2_2.py

      - name: Zip output
        run: |
          cd dist
          zip -r ../Media_Scanner_MD5_V2_macOS_AppleSilicon.zip Media_Scanner_MD5_V2_AppleSilicon.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Media_Scanner_MD5_V2_macOS_AppleSilicon
          path: Media_Scanner_MD5_V2_macOS_AppleSilicon.zip
          retention-days: 30
